<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interform Cocktail Bar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-deep: #121212;
    --gold: #c9a96e; --gold-dim: rgba(201,169,110,0.12); --gold-line: rgba(201,169,110,0.25);
    --white: #f0ece4; --white-dim: rgba(240,236,228,0.5);
  }
  html, body { width: 100%; min-height: 100%; background: var(--bg-deep); color: var(--white); font-family: 'Outfit', sans-serif; font-weight: 300; -webkit-text-size-adjust: 100%; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 999; opacity: 0.6; }
  .glow-top { position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; height: 400px; background: radial-gradient(ellipse, rgba(201,169,110,0.07) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .glow-bottom { position: fixed; bottom: -150px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; height: 300px; background: radial-gradient(ellipse, rgba(30,30,30,0.3) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .page { position: relative; z-index: 1; width: 100%; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 48px 24px 48px; }
  .deco-line-top { width: 1px; height: 36px; background: linear-gradient(to bottom, transparent, var(--gold-line)); margin-bottom: 28px; opacity: 0; animation: fadeIn 0.8s ease forwards 0.2s; }

  .logo-wrap { margin-bottom: 4px; opacity: 0; animation: fadeUp 0.7s ease forwards 0.35s; text-align: center; }
  .logo-mark { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 600; letter-spacing: 0.12em; color: var(--white); }
  .logo-sub { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold); margin-top: 4px; }

  .tagline { font-family: 'Cormorant Garamond', serif; font-size: 13px; font-weight: 300; font-style: italic; letter-spacing: 0.2em; color: var(--gold); opacity: 0; animation: fadeUp 0.7s ease forwards 0.5s; margin-top: 20px; margin-bottom: 32px; text-align: center; }
  .gold-rule { width: 40px; height: 1px; background: var(--gold-line); margin: 0 auto 32px; opacity: 0; animation: fadeIn 0.7s ease forwards 0.55s; }

  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 360px; opacity: 0; animation: fadeUp 0.7s ease forwards 0.7s; }

  .btn {
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    padding: 28px 16px 24px;
    border: 1px solid var(--gold-line);
    background: var(--gold-dim);
    text-decoration: none; color: var(--white);
    cursor: pointer;
    transition: background 0.25s ease, border-color 0.25s ease;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    min-height: 136px;
  }
  .btn:active { opacity: 0.7; }
  .btn.open { border-color: rgba(201,169,110,0.5); background: rgba(201,169,110,0.2); }

  .btn-icon { display: flex; align-items: center; justify-content: center; }
  .btn-icon svg { width: 26px; height: 26px; stroke: var(--gold); stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.85; }

  .btn-text { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .btn-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; letter-spacing: 0.06em; color: var(--white); }
  .btn-hint { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); opacity: 0.65; }

  .wifi-panel { display: none; border: 1px solid var(--gold-line); border-top: none; background: rgba(18,18,18,0.98); padding: 18px 20px; flex-direction: column; gap: 12px; width: 100%; max-width: 360px; }
  .wifi-panel.open { display: flex; animation: fadeUp 0.25s ease forwards; }
  .wifi-row { display: flex; flex-direction: column; gap: 4px; }
  .wifi-label { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--white-dim); }
  .wifi-value { font-family: 'Cormorant Garamond', serif; font-size: 20px; letter-spacing: 0.05em; color: var(--white); }
  .wifi-divider { width: 100%; height: 1px; background: var(--gold-line); opacity: 0.4; }
  .copy-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 13px; border: 1px solid var(--gold-line); background: none; color: var(--gold); font-family: 'Outfit', sans-serif; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .copy-btn.copied { color: #7ec8a0; border-color: rgba(126,200,160,0.4); }

  .ripple { position: absolute; border-radius: 50%; width: 8px; height: 8px; background: rgba(201,169,110,0.2); transform: scale(0); animation: ripple-anim 0.5s ease-out forwards; pointer-events: none; }
  @keyframes ripple-anim { to { transform: scale(40); opacity: 0; } }

  .deco-line-bottom { width: 1px; height: 36px; background: linear-gradient(to bottom, var(--gold-line), transparent); margin-top: 36px; opacity: 0; animation: fadeIn 0.8s ease forwards 1s; }
  .powered-by { margin-top: 14px; opacity: 0; animation: fadeIn 0.8s ease forwards 1.1s; }
  .powered-by a { font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(201,169,110,0.25); text-decoration: none; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<div class="glow-top"></div>
<div class="glow-bottom"></div>
<div class="page">
  <div class="deco-line-top"></div>

  <div class="logo-wrap">
    <div class="logo-mark">INTERFORM</div>
    <div class="logo-sub">Cocktail Bar</div>
  </div>
  <p class="tagline">Vancouver, BC</p>
  <div class="gold-rule"></div>

  <div class="btn-grid">
    <!-- Food -->
    <a class="btn" href="food.html">
      <div class="btn-icon">
        <svg viewBox="0 0 24 24"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>
      </div>
      <div class="btn-text">
        <span class="btn-title">Food</span>
        <span class="btn-hint">Tap to view</span>
      </div>
    </a>

    <!-- Drinks -->
    <a class="btn" href="drinks.html" target="_blank">
      <div class="btn-icon">
        <svg viewBox="0 0 24 24"><path d="M8 22h8"/><path d="M7 10h10"/><path d="M12 15v7"/><path d="M12 15a5 5 0 0 0 5-5c0-2-.5-4-2-8H4c-1.5 4-2 6-2 8a5 5 0 0 0 5 5z"/></svg>
      </div>
      <div class="btn-text">
        <span class="btn-title">Drinks</span>
        <span class="btn-hint">Tap to view</span>
      </div>
    </a>

    <!-- WiFi -->
    <div class="btn" id="btnWifi">
      <div class="btn-icon">
        <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="var(--gold)"/></svg>
      </div>
      <div class="btn-text">
        <span class="btn-title">WiFi</span>
        <span class="btn-hint" id="wifiHint">Tap to connect</span>
      </div>
    </div>

    <!-- Review -->
    <a class="btn" href="review.html">
      <div class="btn-icon">
        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <div class="btn-text">
        <span class="btn-title">Review</span>
        <span class="btn-hint">Share experience</span>
      </div>
    </a>
  </div>

  <!-- WiFi panel -->
  <div class="wifi-panel" id="wifiPanel">
    <div class="wifi-row">
      <span class="wifi-label">Network</span>
      <span class="wifi-value">Interform Guest</span>
    </div>
    <div class="wifi-divider"></div>
    <div class="wifi-row">
      <span class="wifi-label">Password</span>
      <span class="wifi-value">InterformDemo</span>
    </div>
    <button class="copy-btn" id="copyBtn">Copy Password</button>
  </div>

  <div class="deco-line-bottom"></div>
  <div class="powered-by">
    <a href="https://interformlabs.com" target="_blank">interformlabs.com</a>
  </div>
</div>
<script>
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const r = document.createElement('span');
      r.className = 'ripple';
      const rect = btn.getBoundingClientRect();
      r.style.left = (e.clientX - rect.left - 4) + 'px';
      r.style.top  = (e.clientY - rect.top  - 4) + 'px';
      btn.appendChild(r);
      setTimeout(() => r.remove(), 600);
    });
  });

  const btnWifi   = document.getElementById('btnWifi');
  const wifiPanel = document.getElementById('wifiPanel');
  const wifiHint  = document.getElementById('wifiHint');

  btnWifi.addEventListener('click', () => {
    const open = wifiPanel.classList.toggle('open');
    btnWifi.classList.toggle('open', open);
    wifiHint.textContent = open ? 'Tap to hide' : 'Tap to connect';
  });

  document.getElementById('copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText('InterformDemo').then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy Password'; btn.classList.remove('copied'); }, 2000);
    });
  });
</script>
</body>
</html>
